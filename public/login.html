<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="color-scheme" content="dark"><link rel="stylesheet" href="/css/tokens.css"><link rel="stylesheet" href="/css/base.css"><link rel="stylesheet" href="/css/components.css"><link rel="stylesheet" href="/css/pages.css"><link rel="icon" href="/favicon.ico" sizes="48x48"><link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/favicon-32.png"><link rel="apple-touch-icon" href="/assets/brand/apple-touch-icon.png"><link rel="manifest" href="/site.webmanifest"><meta name="theme-color" content="#A51E2F"><link rel="preload" as="image" href="/assets/brand/logo.png"><script>try{if(sessionStorage.getItem("ahc-splash-shown"))document.documentElement.classList.add("no-splash")}catch(e){}</script><title>الدخول — تحدي كأس العالم | الحسني هوم سنتر</title></head>
<body>
  <div class="splash" id="splash" role="status"><img class="splash-logo" src="/assets/brand/logo.png" alt="" width="1920" height="1103"><div class="splash-bar" aria-hidden="true"><i></i></div><span class="sr-only">جارٍ تشغيل تحدي كأس العالم — الحسني هوم سنتر</span></div>
  <script type="module" src="/js/splash.js"></script>
  <div class="login-arc"></div>
  <div class="login-page">
    <div class="card login-card rise">
      <img class="login-logo" src="/assets/brand/logo.png" alt="الحسني هوم سنتر" width="1920" height="1103">
      <h1>مرحباً بك</h1>
      <p class="login-sub">المنصة الرسمية لتوقعات الموظفين — تحدي كأس العالم ٢٠٢٦</p>
      <form id="login-form" class="login-form">
        <div class="field"><label for="u">اسم المستخدم أو رقم الهاتف</label><input id="u" class="input" autocomplete="username" placeholder="username أو 07XXXXXXXXX" required></div>
        <div class="field"><label for="p">كلمة المرور</label><input id="p" class="input" type="password" autocomplete="current-password" required></div>
        <button id="go" class="btn btn-primary" type="submit">دخول</button>
      </form>
      <p class="login-foot" style="margin-top:var(--s-4)">موظف جديد؟ <a href="/register.html" style="color:var(--crimson-text);font-weight:var(--fw-semibold);text-decoration:none">أنشئ حسابك من هنا</a></p>
      <p class="login-foot" style="margin-top:var(--s-2)">توقّع النتائج · اجمع النقاط · نافس فرعك على الصدارة</p>
    </div>
  </div>
  <script type="module" src="/js/pages/login.js"></script>
</body>
</html>
